{% extends "base.html" %}

{% block title %}Withdraw — Banking App{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm">
      <div class="card-header bg-warning py-3">
        <h4 class="mb-0">➖ Withdraw Funds</h4>
      </div>
      <div class="card-body p-4">

        <!-- Current balance guidance -->
        <div class="alert alert-info py-2 mb-3">
          Available balance: <strong>${{ "%.2f" | format(balance) }}</strong>
        </div>

        <!-- Inline error alert -->
        {% if error %}
          <div class="alert alert-danger py-2" role="alert">
            {{ error }}
          </div>
        {% endif %}

        <form action="{{ url_for('withdraw') }}" method="POST" novalidate>

          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount to Withdraw ($)</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text">$</span>
              <input
                type="number"
                class="form-control"
                id="amount"
                name="amount"
                placeholder="0.00"
                min="0.01"
                step="0.01"
              />
            </div>
            <div class="form-text">Enter a positive amount up to your available balance.</div>
          </div>

          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-warning btn-lg">Withdraw</button>
          </div>

        </form>

        <div class="text-center">
          <a href="{{ url_for('dashboard') }}" class="text-decoration-none text-muted">
            ← Back to Dashboard
          </a>
        </div>

      </div><!-- /card-body -->
    </div><!-- /card -->

  </div>
</div>
{% endblock %}
