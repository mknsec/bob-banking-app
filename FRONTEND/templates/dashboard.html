{% extends "base.html" %}

{% block title %}Dashboard — Banking App{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">

    <!-- Account summary card -->
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white py-3">
        <h4 class="mb-0">Account Dashboard</h4>
      </div>
      <div class="card-body text-center py-5">

        <p class="text-muted mb-1">Welcome back,</p>
        <h2 class="fw-bold mb-4">{{ username | title }}</h2>

        <p class="text-muted mb-1">Current Balance</p>
        <h1 class="display-4 fw-bold text-success mb-5">
          ${{ "%.2f" | format(balance) }}
        </h1>

        <!-- Action buttons -->
        <div class="d-flex justify-content-center gap-3">
          <a href="{{ url_for('deposit') }}" class="btn btn-success btn-lg px-4">
            ➕ Deposit
          </a>
          <a href="{{ url_for('withdraw') }}" class="btn btn-warning btn-lg px-4">
            ➖ Withdraw
          </a>
        </div>

      </div><!-- /card-body -->
    </div><!-- /card -->

  </div>
</div>
{% endblock %}
