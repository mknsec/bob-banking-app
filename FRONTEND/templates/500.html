{% extends "base.html" %}

{% block title %}Server Error — Banking App{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center mt-5">
    <h1 class="display-1 text-muted">500</h1>
    <h3 class="mb-3">Something Went Wrong</h3>
    <p class="text-muted mb-4">An unexpected error occurred. Please try again later.</p>
    <a href="{{ url_for('login') }}" class="btn btn-primary">Go to Login</a>
  </div>
</div>
{% endblock %}
