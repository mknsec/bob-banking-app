{% extends "base.html" %}

{% block title %}Login — Banking App{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">

    <div class="card shadow-sm mt-4">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0">🏦 Customer Login</h4>
      </div>
      <div class="card-body p-4">

        <!-- Inline error alert -->
        {% if error %}
          <div class="alert alert-danger py-2" role="alert">
            {{ error }}
          </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" novalidate>

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Log In</button>
          </div>

        </form>
      </div><!-- /card-body -->
    </div><!-- /card -->

    <p class="text-center text-muted small mt-3">
      Demo accounts: <strong>alice</strong> or <strong>bob</strong> — password: <code>password123</code>
    </p>

  </div>
</div>
{% endblock %}
